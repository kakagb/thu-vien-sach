<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Kiếm Hiệp - Quản Lý Toàn Diện</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #8b0000; --accent: #d4af37; --bg: #fdf6e3; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); border: 1px solid var(--accent); }
        h2 { color: var(--primary); text-align: center; border-bottom: 2px double var(--accent); padding-bottom: 10px; }
        
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: #eee; padding: 15px; border-radius: 8px; align-items: center; }
        .admin-section { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .form-card { background: #f9f4e8; padding: 15px; border-radius: 8px; border: 1px solid #ddd; flex: 1; min-width: 300px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-flex; align-items: center; gap: 5px; }
        .btn-add { background: var(--primary); color: white; }
        .btn-excel { background: var(--success); color: white; }
        .btn-pdf { background: #8e44ad; color: white; } /* Màu tím cho PDF */
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn-del { color: #e74c3c; cursor: pointer; }

	/* Cấu hình sửa lỗi mất chữ khi IN/XUẤT PDF */
@media print {
    /* Ẩn tất cả các thành phần không cần thiết */
    .toolbar, .admin-section, .btn-del, #search, .btn, .badge { 
        display: none !important; 
    }

    body { 
        background: white !important; 
        padding: 0 !important; 
        margin: 0 !important; 
    }

    .container { 
        border: none !important; 
        box-shadow: none !important; 
        width: 100% !important; 
        max-width: 100% !important; 
        padding: 0 !important;
        margin: 0 !important;
    }

    table { 
        width: 100% !important; /* Ép bảng luôn dàn đều theo chiều ngang trang giấy */
        table-layout: auto !important; /* Tự động co giãn các cột */
        border-collapse: collapse !important;
    }

    th, td { 
        border: 1px solid #ccc !important; 
        padding: 8px 4px !important; 
        word-break: break-word !important; /* Tự xuống dòng nếu chữ quá dài */
        font-size: 12px !important; /* Giảm nhẹ cỡ chữ để bảng gọn hơn */
    }

    th { 
        background: #f2f2f2 !important; 
        color: black !important; 
    }

    /* Đảm bảo tiêu đề và thống kê không bị lệch */
    h2, #stats { 
        text-align: center !important; 
        width: 100% !important;
    }
}
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📚 QUẢN LÝ THƯ VIỆN SÁCH</h2>

    <div class="toolbar">
        <button class="btn btn-excel" onclick="exportToExcel()">📤 Xuất Excel</button>
        <button class="btn btn-pdf" onclick="window.print()">🖨️ In / Xuất PDF</button>
        <button class="btn" style="background:#2980b9; color:white" onclick="document.getElementById('fileImport').click()">📥 Nhập Excel</button>
        <input type="file" id="fileImport" style="display:none" accept=".xlsx, .xls, .csv" onchange="importFromExcel(event)">
    </div>

    <div class="admin-section">
        <div class="form-card" style="flex: 0.3;">
            <b style="color:var(--primary)">+ THỂ LOẠI</b>
            <input type="text" id="newGenreName" placeholder="Tên thể loại..." style="width:100%; margin:10px 0;">
            <button class="btn btn-add" style="background:var(--accent); width:100%" onclick="addNewGenre()">Thêm Thể Loại</button>
        </div>

        <div class="form-card" style="flex: 1;">
            <b style="color:var(--primary)">+ SÁCH MỚI</b>
            <div class="form-grid">
                <input type="text" id="bookName" placeholder="Tên tác phẩm..." class="full-width">
                <input list="authorList" id="authorInput" placeholder="Tác giả...">
                <datalist id="authorList"></datalist>
                <select id="genreSelect"></select>
                <input type="number" id="volInput" value="1" title="Số quyển">
                <button class="btn btn-add" onclick="addNewBook()">LƯU VÀO HỆ THỐNG</button>
            </div>
        </div>
    </div>

    <input type="text" id="search" style="width:100%; padding:15px; margin-bottom:20px; border-radius:30px; border:2px solid var(--accent);" placeholder="🔍 Tìm nhanh..." onkeyup="renderTable()">

    <table id="mainTable">
        <thead>
            <tr>
                <th style="width:50px">STT</th>
                <th>Tên Sách</th>
                <th>Tác Giả</th>
                <th>Thể Loại</th>
                <th style="width:50px">Quyển</th>
                <th class="btn-del"></th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <div id="stats" style="margin-top: 15px; text-align: right; font-weight: bold; color: var(--primary);"></div>
</div>

<script>
    const defaultGenres = ["Kiếm Hiệp", "Dã Sử", "Xã Hội"];
    // Nạp dữ liệu mẫu ban đầu từ PDF
    let library = JSON.parse(localStorage.getItem('lib_final_books')) || [
        {name: "CỔ PHÙ BÍ LỤC", author: "Âu Dương Phúc", genre: "Kiếm Hiệp", vol: 9},
        {name: "ANH HÙNG XẠ ĐIÊU", author: "Kim Dung", genre: "Kiếm Hiệp", vol: 8},
        {name: "TAM QUỐC DIỄN NGHĨA", author: "La Quán Trung", genre: "Dã Sử", vol: 2}
    ];
    let genres = JSON.parse(localStorage.getItem('lib_final_genres')) || defaultGenres;

    function saveAll() {
        localStorage.setItem('lib_final_books', JSON.stringify(library));
        localStorage.setItem('lib_final_genres', JSON.stringify(genres));
        updateUI();
    }

    function updateUI() {
        document.getElementById('genreSelect').innerHTML = genres.map(g => `<option value="${g}">${g}</option>`).join('');
        const authors = [...new Set(library.map(b => b.author))].sort();
        document.getElementById('authorList').innerHTML = authors.map(a => `<option value="${a}">`).join('');
        renderTable();
    }

    function addNewGenre() {
        const val = document.getElementById('newGenreName').value.trim();
        if(val && !genres.includes(val)) { genres.push(val); saveAll(); document.getElementById('newGenreName').value=''; }
    }

    function addNewBook() {
        const name = document.getElementById('bookName').value.toUpperCase().trim();
        const author = document.getElementById('authorInput').value.trim();
        const genre = document.getElementById('genreSelect').value;
        const vol = parseInt(document.getElementById('volInput').value);
        if(!name || !author) return alert("Thiếu tên sách hoặc tác giả!");
        library.unshift({ name, author, genre, vol });
        saveAll();
        document.getElementById('bookName').value = '';
    }

    function renderTable() {
        const query = document.getElementById('search').value.toLowerCase();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const filtered = library.filter(b => b.name.toLowerCase().includes(query) || b.author.toLowerCase().includes(query) || b.genre.toLowerCase().includes(query));
        filtered.forEach((b, i) => {
            tbody.innerHTML += `<tr>
                <td>${i+1}</td>
                <td><b>${b.name}</b></td>
                <td>${b.author}</td>
                <td>${b.genre}</td>
                <td>${b.vol}</td>
                <td class="btn-del" onclick="deleteBook(${library.indexOf(b)})">❌</td>
            </tr>`;
        });
        document.getElementById('stats').innerText = `Tổng: ${filtered.length} đầu sách | ${filtered.reduce((s,b)=>s+b.vol,0)} quyển`;
    }

    function deleteBook(index) { if(confirm("Xóa?")) { library.splice(index, 1); saveAll(); } }

    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(library);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Library");
        XLSX.writeFile(wb, "ThuVienSach.xlsx");
    }

    function importFromExcel(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            library = json.map(item => ({
                name: (item.name || item["Tên Sách"] || "").toUpperCase(),
                author: item.author || item["Tác Giả"] || "Khuyết Danh",
                genre: item.genre || item["Thể Loại"] || "Khác",
                vol: parseInt(item.vol || item["Số Quyển"] || 1)
            }));
            saveAll();
        };
        reader.readAsArrayBuffer(file);
    }

    updateUI();
</script>
</body>
</html>
